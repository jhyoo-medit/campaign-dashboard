<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.hdr{padding:14px 20px 0;border-bottom:.5px solid var(--color-border-tertiary,#e5e5e5);}
.ht{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.ttl{font-size:16px;font-weight:500;color:var(--color-text-primary,#111);}
.sub{font-size:11px;color:var(--color-text-secondary,#666);margin-top:2px;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 7px;border-radius:8px;background:#EEEDFE;color:#3C3489;margin-left:6px;}
.sbar{display:flex;gap:5px;flex-wrap:wrap;}
.sbtn{font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:.5px solid var(--color-border-tertiary,#e5e5e5);background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666);}
.sbtn.a0{background:var(--color-text-primary,#111);color:var(--color-background-primary,#fff);border-color:transparent;}
.sbtn.a1{background:#534AB7;color:#fff;border-color:transparent;}
.sbtn.a2{background:#0F6E56;color:#fff;border-color:transparent;}
.sbtn.a3{background:#185FA5;color:#fff;border-color:transparent;}
.fbar{display:flex;gap:8px;padding:8px 20px 9px;border-bottom:.5px solid var(--color-border-tertiary,#e5e5e5);flex-wrap:wrap;align-items:center;}
.fsel{font-size:12px;padding:3px 8px;border-radius:6px;border:.5px solid var(--color-border-tertiary,#e5e5e5);background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-primary,#111);cursor:pointer;max-width:160px;}
.fsel.on{border-color:#534AB7;background:#EEEDFE;}
.fclear{font-size:11px;color:#534AB7;cursor:pointer;padding:3px 8px;border-radius:6px;border:.5px solid #534AB7;}
.fcount{margin-left:auto;font-size:11px;color:var(--color-text-secondary,#666);}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 20px;}
.kc{background:var(--color-background-secondary,#f5f5f5);border-radius:8px;padding:10px 12px;}
.kl{font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:3px;}
.kv{font-size:24px;font-weight:500;color:var(--color-text-primary,#111);line-height:1;}
.km{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
.ks{font-size:11px;color:var(--color-text-secondary,#666);}
.bd{font-size:11px;font-weight:500;padding:1px 6px;border-radius:8px;}
.up{background:#D1FAE5;color:#065F46;}.dn{background:#FEE2E2;color:#991B1B;}
.tabs{display:flex;padding:0 20px;border-bottom:.5px solid var(--color-border-tertiary,#e5e5e5);}
.tb{font-size:13px;padding:8px 14px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary,#666);border-bottom:2px solid transparent;margin-bottom:-.5px;}
.tb.on{color:var(--color-text-primary,#111);border-bottom-color:var(--color-text-primary,#111);font-weight:500;}
.pane{display:none;padding:12px 20px 0;}
.pane.on{display:block;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.card{background:var(--color-background-primary,#fff);border:.5px solid var(--color-border-tertiary,#e5e5e5);border-radius:10px;padding:13px;}
.ct{font-size:13px;font-weight:500;color:var(--color-text-primary,#111);margin-bottom:1px;}
.cs{font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:9px;}
.leg{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:9px;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary,#666);}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.chip{background:var(--color-background-secondary,#f5f5f5);border-radius:8px;padding:8px 10px;}
.chn{font-size:10px;font-weight:500;color:var(--color-text-secondary,#666);text-transform:uppercase;letter-spacing:.04em;}
.chv{font-size:19px;font-weight:500;color:var(--color-text-primary,#111);margin-top:2px;}
.chr{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.tgg{font-size:10px;padding:1px 5px;border-radius:8px;background:#EEEDFE;color:#3C3489;}
.tgt{font-size:10px;padding:1px 5px;border-radius:8px;background:#E1F5EE;color:#085041;}
.osr{display:flex;align-items:center;margin-bottom:7px;gap:7px;}
.osn{font-size:11px;font-weight:500;width:115px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--color-text-primary,#111);}
.osbw{flex:1;height:20px;border-radius:4px;overflow:hidden;display:flex;background:var(--color-background-secondary,#f5f5f5);}
.oss{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;overflow:hidden;}
.ost{font-size:11px;color:var(--color-text-secondary,#666);width:28px;text-align:right;flex-shrink:0;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;color:var(--color-text-secondary,#666);font-weight:400;font-size:11px;padding:3px 5px 6px 0;border-bottom:.5px solid var(--color-border-tertiary,#e5e5e5);}
.tbl td{padding:5px 5px 5px 0;border-bottom:.5px solid var(--color-border-tertiary,#e5e5e5);color:var(--color-text-primary,#111);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.bold{font-weight:500;}
</style>

function buildDailyTable(){
  const sd=SRC==='all'?ALL:ALL.filter(d=>d.src===SRC);
  const gM={},t1M={},t2M={};
  sd.filter(d=>d.src==='glow').forEach(d=>{gM[d.d]=(gM[d.d]||0)+1;});
  sd.filter(d=>d.src==='trade1').forEach(d=>{t1M[d.d]=(t1M[d.d]||0)+1;});
  sd.filter(d=>d.src==='trade2').forEach(d=>{t2M[d.d]=(t2M[d.d]||0)+1;});
  const days=[...new Set(sd.map(d=>d.d))].sort();
  let cum=0;
  const rowsAsc=days.map(d=>{const g=gM[d]||0,t1=t1M[d]||0,t2=t2M[d]||0,tot=g+t1+t2;cum+=tot;return{d,g,t1,t2,tot,cum};});
  const rows=[...rowsAsc].reverse();
  const b=document.getElementById('dtb');if(!b)return;b.innerHTML='';
  rows.forEach(({d,g,t1,t2,tot,cum})=>{
    b.innerHTML+=`<tr><td class="bold">${d}</td><td class="num" style="color:#534AB7">${g||'—'}</td><td class="num" style="color:#0F6E56">${t1||'—'}</td><td class="num" style="color:#185FA5">${t2||'—'}</td><td class="num bold">${tot}</td><td class="num" style="font-weight:500;color:var(--color-text-secondary,#666)">${cum}</td></tr>`;
  });
}

async function _searchDeals(formValue,src){
  let after=null,results=[],page=0;
  while(page<20){
    const body={
      filterGroups:[{filters:[{propertyName:'deal_form_submission',operator:'EQ',value:formValue}]}],
      properties:['dealstage','createdate','hubspot_owner_id','hs_analytics_source_data_2','deal_country','sales_region'],
      limit:100
    };
    if(after)body.after=after;
    const res=await fetch(PROXY+'?url='+encodeURIComponent('https://api.hubapi.com/crm/v3/objects/deals/search'),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok)throw new Error('API '+res.status);
    const j=await res.json();
    (j.results||[]).forEach(d=>{
      const created=(d.properties?.createdate||'').slice(0,10);
      const owner=d.properties?.hubspot_owner_id||'';
      const stage=d.properties?.dealstage||'';
      const region=d.properties?.sales_region||null;
      const country=d.properties?.deal_country||'—';
      if(created)results.push([created,region,country,owner,stage,src]);
    });
    if(j.paging?.next?.after){after=j.paging.next.after;page++;}else break;
  }
  return results;
}

async function _fetchAndMerge(){
  try{
    _setStatus('static','HubSpot에서 데이터 불러오는 중...');
    // Owner 목록 + 딜 데이터 동시 조회
    const [glowDeals,trade1Deals,trade2Deals]=await Promise.all([
      _searchDeals('2026 glow campaign','glow'),
      _searchDeals('medit trade-in 2026 quickstart promotion','trade1'),
      _searchDeals('Medit 2026 Q2 Trade-in','trade2')
    ]);
    // Owner 목록 별도 조회 (GET 요청)
    try{
      const ownersRes=await fetch(PROXY+'?url='+encodeURIComponent('https://api.hubapi.com/crm/v3/owners?limit=500&includeInactive=true'),{
        method:'GET',
        headers:{'Content-Type':'application/json'}
      });
      if(ownersRes.ok){
        const ownersData=await ownersRes.json();
        (ownersData.results||[]).forEach(o=>{
          const name=[o.firstName,o.lastName].filter(Boolean).join(' ');
          if(name)OW[String(o.id)]=name;
        });
        console.log('✅ Owners 로드 완료:', Object.keys(OW).length+'명');
      }
    }catch(e){console.warn('Owner 로드 실패:', e.message);}
    const allApiDeals=[...glowDeals,...trade1Deals,...trade2Deals];
    if(!allApiDeals.length){_setStatus('err','딜 없음 — API 확인 필요');return;}
    // ALL 완전 교체
    ALL.length=0;
    const _owrCnt2={};
    allApiDeals.filter(r=>r[3]!=='339528603').forEach(r=>{
      const region=r[1]||'(Unassigned)';
      ALL.push({d:r[0],r:region,c:r[2]||'—',o:r[3],sid:r[4],src:r[5]});
      if(region!=='(Unassigned)'&&r[3]){
        if(!_owrCnt2[r[3]])_owrCnt2[r[3]]={};
        _owrCnt2[r[3]][region]=(_owrCnt2[r[3]][region]||0)+1;
      }
    });
    Object.keys(_owrCnt2).forEach(o=>{
      const best=Object.entries(_owrCnt2[o]).sort((a,b)=>b[1]-a[1])[0];
      if(best)OWNER_REGION[o]=best[0];
    });
    _liveMode=true;
    const gLive=glowDeals.length;
    const t1Live=trade1Deals.length;
    const t2Live=trade2Deals.length;
    gC = gLive; t1C = t1Live; t2C = t2Live; tC = t1Live + t2Live;
    console.log('✅ API Glow:'+gC+', Q1:'+t1C+', Q2:'+t2C+', Total:'+(gC+tC));
    const now2=new Date(Date.now()+9*60*60*1000).toISOString().slice(0,10);
    _setStatus('live',`Live — Glow ${gLive} · Q1 ${t1Live} · Q2 ${t2Live} · Total ${allApiDeals.length}건 · ${new Date().toLocaleTimeString('ko-KR')}`);
    document.querySelector('.sub').textContent=`Based on deal_form_submission · Total ${allApiDeals.length} deals (API) · As of ${now2}`;
    if(document.getElementById('_connMsg'))
      document.getElementById('_connMsg').innerHTML=`<span style="color:#1D9E75">✓ ${new Date().toLocaleTimeString('ko-KR')} 업데이트 완료 — ${allApiDeals.length}건</span>`;
    render();
  }catch(err){
    _liveMode=false;
    _setStatus('err','연결 실패: '+err.message);
    if(document.getElementById('_connMsg'))
      document.getElementById('_connMsg').innerHTML=`<span style="color:#E24B4A">✗ ${err.message}</span>`;
    render(); // 실패 시에도 RAW 데이터로 렌더링
  }
}
